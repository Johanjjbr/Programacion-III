<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Ejercicio 3 - Formulario con Tablas</title>
</head>
<body>
    <h2>Tienda de ropa</h2>
    <h4>Registro para recibir promociones</h4>

    <form id="formulario_registro" action="procesar04.php" method="POST">
        <table border="1">
            <tr>
                <td><label>Correo</label></td>
                <td>
                    <input type="email" id="mail" name="mail" 
                           placeholder="tucorreo@dominio.com" required/>
                </td>
            </tr>
            <tr>
                <td><label>Contraseña</label></td>
                <td>
                    <input type="password" id="pass" name="pass" required/>
                </td>
            </tr>
            <tr>
                <td><label>Telefono</label></td>
                <td>
                    <input type="tel" id="tel" name="tel" placeholder="123-456-7890" required/>
                </td>
            </tr>
            <tr>
                <td></td>
                <td>
                    <button id="enviar" type="submit">Enviar</button>
                </td>
            </tr>
        </table>
    </form>

    <br>

</body>
</html>
